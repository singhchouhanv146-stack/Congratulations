<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shreya Celebration 🎉</title>  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7, #c1c8ff);
      overflow: hidden;
      color: #333;
    }

    h1 {
      margin-top: 30px;
      font-size: 45px;
      color: #fff;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #fff, 0 0 20px #ff6b81; }
      to { text-shadow: 0 0 20px #fff, 0 0 40px #6c5ce7; }
    }

    .card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 25px;
      margin: 25px auto;
      width: 320px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      animation: pop 1s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    button {
      padding: 14px 22px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(45deg, #ff6b81, #ff9ff3);
      color: white;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .emoji {
      position: absolute;
      font-size: 30px;
      animation: floatUp 8s linear infinite;
      opacity: 0.8;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.8); }
      100% { transform: translateY(-10vh) scale(1.2); }
    }

    .message {
      font-size: 20px;
      margin-top: 25px;
      color: #fff;
      animation: fadeIn 2s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .heart {
      position: absolute;
      color: #ff6b81;
      animation: floatHeart 6s infinite;
    }

    @keyframes floatHeart {
      0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

  </style></head>
<body>  <h1>🎉 Congratulations Shreya 🎉</h1>  <div class="card">
    <h2>Shreya Singh Chouhan</h2>
    <p>Class 10 - MP Board</p>
    <p>Score: 464 / 500</p>
    <h2 style="color:#28a745;">93%</h2>
  </div><button onclick="celebrate()">✨ Celebrate Your Success ✨</button>

  <p id="msg" class="message"></p>  <!-- Floating Emojis -->  <div class="emoji" style="left:10%; animation-delay:0s;">🎈</div>
  <div class="emoji" style="left:25%; animation-delay:2s;">🎉</div>
  <div class="emoji" style="left:40%; animation-delay:4s;">✨</div>
  <div class="emoji" style="left:60%; animation-delay:1s;">🌟</div>
  <div class="emoji" style="left:80%; animation-delay:3s;">🥳</div>  <!-- Floating Hearts -->  <div class="heart" style="left:15%; font-size:20px;">💖</div>
  <div class="heart" style="left:45%; font-size:25px;">💗</div>
  <div class="heart" style="left:75%; font-size:22px;">💞</div>  <h3 class="message">
    Dear Shreya 💖<br><br>
    Your hard work, dedication, and strength made this possible.<br>
    93% is not just marks, it's your effort shining 🌟<br><br>
    I am very proud of you ❤️<br><br>
    - Your Brother Vikram
  </h3>  <script>
    function celebrate() {
      document.getElementById("msg").innerText = "🎉 You Did It! So Proud of You! 🎉";

      let duration = 4000;
      let end = Date.now() + duration;

      (function frame() {
        confetti({ particleCount: 6, angle: 60, spread: 70, origin: { x: 0 } });
        confetti({ particleCount: 6, angle: 120, spread: 70, origin: { x: 1 } });
        if (Date.now() < end) requestAnimationFrame(frame);
      })();
    }

    window.onload = () => {
      setTimeout(() => {
        confetti({ particleCount: 200, spread: 140 });
      }, 800);
    };
  </script></body>
</html>
